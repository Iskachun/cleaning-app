<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Log in</title>
</head>
<body>
  <h1>Log in</h1>
 
  <form action="/login" method="POST">
    <label for="username">Username:</label>
    <input id="username" name="username" type="text" required>
    <br>
 
    <label for="password">Password:</label>
    <input id="password" name="password" type="password" required>
    <br>
 
    <button type="submit">Log in</button>
  </form>

  <p>Or do you wish to <a href="/signin.html">sign in</a> instead?</p>
 
  <!-- Enkel måte å vise feil: sjekk etter ?error=invalid i URL med litt JS om du vil -->
</body>
</html>
